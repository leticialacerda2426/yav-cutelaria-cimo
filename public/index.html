<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YAV Digital · Clientes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#07070f;color:#f0ede8;font-family:'Poppins',sans-serif;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;
  -webkit-font-smoothing:antialiased;}
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 55% at 5% 0%,rgba(123,47,255,0.28) 0%,transparent 55%),
    radial-gradient(ellipse 50% 40% at 95% 15%,rgba(0,196,167,0.18) 0%,transparent 50%),
    radial-gradient(ellipse 60% 50% at 50% 105%,rgba(80,20,200,0.22) 0%,transparent 55%),#07070f;}
.wrap{position:relative;z-index:1;max-width:640px;width:100%;text-align:center;}
.logo{display:inline-flex;align-items:center;gap:10px;margin-bottom:2.5rem;text-decoration:none;}
.logo-sq{width:40px;height:40px;background:linear-gradient(135deg,#7B2FFF,#4a0dcc);border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff;
  box-shadow:0 0 20px rgba(123,47,255,0.55);}
.logo-txt{font-size:20px;font-weight:700;color:#fff;letter-spacing:0.04em;}
.logo-txt span{color:#a67cff;}
h1{font-size:clamp(22px,4vw,32px);font-weight:800;margin-bottom:0.6rem;color:#fff;}
p.sub{font-size:14px;color:#555;margin-bottom:2.5rem;}
.client-card{background:rgba(10,8,25,0.6);border:1px solid rgba(123,47,255,0.18);border-radius:16px;
  padding:1.8rem;text-align:left;backdrop-filter:blur(10px);}
.client-name{font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:#a67cff;margin-bottom:0.5rem;}
.client-title{font-size:18px;font-weight:700;color:#fff;margin-bottom:1.2rem;}
.report-list{display:flex;flex-direction:column;gap:10px;}
.report-link{display:flex;align-items:center;justify-content:space-between;
  background:rgba(123,47,255,0.07);border:1px solid rgba(123,47,255,0.15);
  border-radius:10px;padding:0.9rem 1.2rem;text-decoration:none;
  transition:border-color .25s,transform .25s;}
.report-link:hover{border-color:rgba(123,47,255,0.4);transform:translateX(4px);}
.report-link:nth-child(2){background:rgba(0,196,167,0.06);border-color:rgba(0,196,167,0.15);}
.report-link:nth-child(2):hover{border-color:rgba(0,196,167,0.4);}
.rl-left{display:flex;flex-direction:column;gap:3px;}
.rl-period{font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:#555;}
.report-link:nth-child(1) .rl-period{color:#7B2FFF;}
.report-link:nth-child(2) .rl-period{color:#00C4A7;}
.rl-title{font-size:14px;font-weight:600;color:#f0ede8;}
.rl-arrow{font-size:18px;color:#333;}
.report-link:nth-child(1) .rl-arrow{color:#a67cff;}
.report-link:nth-child(2) .rl-arrow{color:#00C4A7;}
.footer{margin-top:2rem;font-size:11px;color:#1e1a2e;}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
  <a class="logo" href="#">
    <div class="logo-sq">YAV</div>
    <span class="logo-txt">YAV <span>Digital</span></span>
  </a>
  <h1>Portal de Relatórios</h1>
  <p class="sub">Acesse os relatórios de performance das campanhas Google Ads</p>

  <div class="client-card">
    <p class="client-name">Cliente</p>
    <p class="client-title">Cutelaria Cimo</p>
    <div class="report-list">
      <a class="report-link" href="/cutelaria-cimo/semana1-abril2026.html">
        <div class="rl-left">
          <span class="rl-period">Abril 2026 · Semana 01</span>
          <span class="rl-title">Resultados da primeira semana de gestão</span>
        </div>
        <span class="rl-arrow">→</span>
      </a>
      <a class="report-link" href="/cutelaria-cimo/maio2026.html">
        <div class="rl-left">
          <span class="rl-period">Maio 2026 · 1 a 21 mai</span>
          <span class="rl-title">Conversões em alta — +233% vs. período anterior</span>
        </div>
        <span class="rl-arrow">→</span>
      </a>
    </div>
  </div>
  <p class="footer">YAV Digital · Google Ads · 2026</p>
</div>
</body>
</html>
